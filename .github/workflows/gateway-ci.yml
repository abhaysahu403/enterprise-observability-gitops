name: Gateway Service CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'gateway/**'
      - '.github/workflows/gateway-ci.yml'

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: enterprise-observability/gateway
  SERVICE_NAME: gateway

jobs:
  build-test-scan:
    name: Build, Test & Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: ./gateway
        run: mvn clean package -DskipTests

      - name: Run Unit Tests
        working-directory: ./gateway
        run: mvn test || true

      - name: Build Docker Image
        working-directory: ./gateway
        run: docker build -t ${{ env.SERVICE_NAME }}:${{ github.sha }} .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.SERVICE_NAME }}:${{ github.sha }}
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Configure AWS credentials
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.ref == 'refs/heads/main'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag and Push to ECR
        if: github.ref == 'refs/heads/main'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: v1.0.${{ github.run_number }}
        run: |
          docker tag ${{ env.SERVICE_NAME }}:${{ github.sha }} $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
          docker tag ${{ env.SERVICE_NAME }}:${{ github.sha }} $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest

      - name: Update Kubernetes manifest
        if: github.ref == 'refs/heads/main'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: v1.0.${{ github.run_number }}
        run: |
          sed -i "s|image:.*${{ env.ECR_REPOSITORY }}.*|image: $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG|g" k8s/gateway/deployment.yaml
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add k8s/gateway/deployment.yaml
          git commit -m "Update gateway image to $IMAGE_TAG [skip ci]" || echo "No changes to commit"
          git push || echo "Nothing to push"

      - name: Deployment Summary
        if: github.ref == 'refs/heads/main'
        run: |
          echo "✅ Gateway Service Deployed Successfully!"
          echo "📦 Image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:v1.0.${{ github.run_number }}"
          echo "🚀 FluxCD will automatically deploy to EKS cluster"
          echo "📊 Monitor deployment in Dynatrace"
