name: Frontend CI/CD
on: {push: {branches: [main], paths: ['frontend/**']}}
env: {AWS_REGION: us-east-1, ECR_REPOSITORY: enterprise-observability/frontend, SERVICE_NAME: frontend}
jobs:
  cicd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: '18', cache: 'npm', cache-dependency-path: frontend/package-lock.json}
      - working-directory: ./frontend
        run: npm ci && npm run build
      - working-directory: ./frontend
        run: npm test -- --run || true
      - run: docker build -f frontend/Dockerfile -t ${{ env.SERVICE_NAME }}:${{ github.sha }} .
      - uses: aquasecurity/trivy-action@master
        with: {image-ref: "${{ env.SERVICE_NAME }}:${{ github.sha }}", format: sarif, output: t.sarif}
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with: {sarif_file: t.sarif}
      - uses: aws-actions/configure-aws-credentials@v4
        if: github.ref == 'refs/heads/main'
        with: {aws-access-key-id: "${{ secrets.AWS_ACCESS_KEY_ID }}", aws-secret-access-key: "${{ secrets.AWS_SECRET_ACCESS_KEY }}", aws-region: "${{ env.AWS_REGION }}"}
      - uses: aws-actions/amazon-ecr-login@v2
        if: github.ref == 'refs/heads/main'
        id: ecr
      - if: github.ref == 'refs/heads/main'
        env: {R: "${{ steps.ecr.outputs.registry }}", T: "v1.0.${{ github.run_number }}"}
        run: |
          docker tag ${{ env.SERVICE_NAME }}:${{ github.sha }} $R/${{ env.ECR_REPOSITORY }}:$T && docker push $R/${{ env.ECR_REPOSITORY }}:$T
          docker tag ${{ env.SERVICE_NAME }}:${{ github.sha }} $R/${{ env.ECR_REPOSITORY }}:latest && docker push $R/${{ env.ECR_REPOSITORY }}:latest
          sed -i "s|image:.*|image: $R/${{ env.ECR_REPOSITORY }}:$T|g" k8s/frontend/deployment.yaml
          git config user.name "Bot" && git config user.email "bot@github.com" && git add k8s/frontend/deployment.yaml
          git commit -m "frontend $T [skip ci]" || true && git push || true
