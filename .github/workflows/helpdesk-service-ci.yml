name: Helpdesk Service CI/CD
on: {push: {branches: [main], paths: ['helpdesk-service/**']}}
env: {AWS_REGION: us-east-1, ECR_REPOSITORY: enterprise-observability/helpdesk-service, SERVICE_NAME: helpdesk-service}
jobs:
  cicd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {java-version: '17', distribution: 'temurin', cache: maven}
      - working-directory: ./helpdesk-service
        run: mvn clean package -DskipTests && mvn test
      - working-directory: ./helpdesk-service
        env: {SONAR_TOKEN: "${{ secrets.SONAR_TOKEN }}"}
        run: mvn sonar:sonar -Dsonar.projectKey=helpdesk-service || true
      - working-directory: ./helpdesk-service
        run: mvn org.owasp:dependency-check-maven:check || true
      - working-directory: ./helpdesk-service
        run: docker build -t ${{ env.SERVICE_NAME }}:${{ github.sha }} .
      - uses: aquasecurity/trivy-action@master
        with: {image-ref: "${{ env.SERVICE_NAME }}:${{ github.sha }}", format: sarif, output: t.sarif}
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with: {sarif_file: t.sarif}
      - uses: aws-actions/configure-aws-credentials@v4
        if: github.ref == 'refs/heads/main'
        with: {aws-access-key-id: "${{ secrets.AWS_ACCESS_KEY_ID }}", aws-secret-access-key: "${{ secrets.AWS_SECRET_ACCESS_KEY }}", aws-region: "${{ env.AWS_REGION }}"}
      - uses: aws-actions/amazon-ecr-login@v2
        if: github.ref == 'refs/heads/main'
        id: ecr
      - if: github.ref == 'refs/heads/main'
        env: {R: "${{ steps.ecr.outputs.registry }}", T: "v1.0.${{ github.run_number }}"}
        run: |
          docker tag ${{ env.SERVICE_NAME }}:${{ github.sha }} $R/${{ env.ECR_REPOSITORY }}:$T && docker push $R/${{ env.ECR_REPOSITORY }}:$T
          docker tag ${{ env.SERVICE_NAME }}:${{ github.sha }} $R/${{ env.ECR_REPOSITORY }}:latest && docker push $R/${{ env.ECR_REPOSITORY }}:latest
          sed -i "s|image:.*|image: $R/${{ env.ECR_REPOSITORY }}:$T|g" k8s/helpdesk-service/deployment.yaml
          git config user.name "Bot" && git config user.email "bot@github.com" && git add k8s/helpdesk-service/deployment.yaml
          git commit -m "helpdesk-service $T [skip ci]" || true && git push || true
