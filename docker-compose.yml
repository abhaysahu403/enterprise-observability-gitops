networks:
  enterprise-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:

x-service-env: &service-env
  DB_HOST: postgres
  DB_PORT: 5432
  DB_USER: ${POSTGRES_USER:-enterprise}
  DB_PASSWORD: ${POSTGRES_PASSWORD:-enterprise_pass}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  JWT_SECRET: ${JWT_SECRET:-ZW50ZXJwcmlzZS1vYnNlcnZhYmlsaXR5LWRlbW8tc3VwZXItc2VjcmV0LWtleS1jaGFuZ2UtbWU=}

services:

  # ---------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: enterprise-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-enterprise}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-enterprise_pass}
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-enterprise}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [enterprise-net]

  redis:
    image: redis:7-alpine
    container_name: enterprise-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [enterprise-net]

  # ---------------------------------------------------------------------
  # Backend microservices
  # ---------------------------------------------------------------------
  authentication-service:
    build:
      context: .
      dockerfile: services/authentication-service/Dockerfile
    container_name: authentication-service
    environment:
      <<: *service-env
      DB_NAME: auth_db
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/actuator/health/liveness"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks: [enterprise-net]

  employee-service:
    build:
      context: .
      dockerfile: services/employee-service/Dockerfile
    container_name: employee-service
    environment:
      <<: *service-env
      DB_NAME: employee_db
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/actuator/health/liveness"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks: [enterprise-net]

  leave-service:
    build:
      context: .
      dockerfile: services/leave-service/Dockerfile
    container_name: leave-service
    environment:
      <<: *service-env
      DB_NAME: leave_db
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/actuator/health/liveness"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks: [enterprise-net]

  payroll-service:
    build:
      context: .
      dockerfile: services/payroll-service/Dockerfile
    container_name: payroll-service
    environment:
      <<: *service-env
      DB_NAME: payroll_db
    depends_on:
      postgres: { condition: service_healthy }
    ports:
      - "8084:8084"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8084/actuator/health/liveness"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks: [enterprise-net]

  asset-service:
    build:
      context: .
      dockerfile: services/asset-service/Dockerfile
    container_name: asset-service
    environment:
      <<: *service-env
      DB_NAME: asset_db
    depends_on:
      postgres: { condition: service_healthy }
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8085/actuator/health/liveness"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks: [enterprise-net]

  helpdesk-service:
    build:
      context: .
      dockerfile: services/helpdesk-service/Dockerfile
    container_name: helpdesk-service
    environment:
      <<: *service-env
      DB_NAME: helpdesk_db
    depends_on:
      postgres: { condition: service_healthy }
    ports:
      - "8086:8086"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8086/actuator/health/liveness"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks: [enterprise-net]

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: notification-service
    environment:
      <<: *service-env
      DB_NAME: notification_db
    depends_on:
      postgres: { condition: service_healthy }
    ports:
      - "8087:8087"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8087/actuator/health/liveness"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks: [enterprise-net]

  # ---------------------------------------------------------------------
  # Gateway
  # ---------------------------------------------------------------------
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: gateway
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-ZW50ZXJwcmlzZS1vYnNlcnZhYmlsaXR5LWRlbW8tc3VwZXItc2VjcmV0LWtleS1jaGFuZ2UtbWU=}
      AUTH_SERVICE_URL: http://authentication-service:8081
      EMPLOYEE_SERVICE_URL: http://employee-service:8082
      LEAVE_SERVICE_URL: http://leave-service:8083
      PAYROLL_SERVICE_URL: http://payroll-service:8084
      ASSET_SERVICE_URL: http://asset-service:8085
      HELPDESK_SERVICE_URL: http://helpdesk-service:8086
      NOTIFICATION_SERVICE_URL: http://notification-service:8087
    depends_on:
      redis: { condition: service_healthy }
      authentication-service: { condition: service_healthy }
      employee-service: { condition: service_healthy }
      leave-service: { condition: service_healthy }
      payroll-service: { condition: service_healthy }
      asset-service: { condition: service_healthy }
      helpdesk-service: { condition: service_healthy }
      notification-service: { condition: service_healthy }
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [enterprise-net]

  # ---------------------------------------------------------------------
  # Frontend
  # ---------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: frontend
    depends_on:
      gateway: { condition: service_healthy }
    ports:
      - "3000:3000"
    networks: [enterprise-net]

  # ---------------------------------------------------------------------
  # Reverse proxy (single front door on port 80)
  # ---------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: enterprise-nginx
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - gateway
    ports:
      - "80:80"
    networks: [enterprise-net]
