# Front-door reverse proxy for the Enterprise Observability Demonstration
# Platform. Routes browser traffic to the frontend and API calls to the
# gateway, so the whole platform is reachable through a single port (80).

upstream frontend_upstream {
    server frontend:3000;
}

upstream gateway_upstream {
    server gateway:8080;
}

server {
    listen 80;
    server_name _;

    # Correlation id propagation for observability
    proxy_set_header X-Request-Id $request_id;

    location /api/ {
        proxy_pass http://gateway_upstream/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /actuator/ {
        proxy_pass http://gateway_upstream/actuator/;
    }

    location / {
        proxy_pass http://frontend_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
