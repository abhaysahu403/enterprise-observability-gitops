apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: grafana
  namespace: monitoring
spec:
  interval: 5m
  chart:
    spec:
      chart: grafana
      version: 7.0.8
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
      interval: 1m
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    replicas: 1
    
    image:
      repository: grafana/grafana
      tag: 10.2.2
    
    adminUser: admin
    adminPassword: "GrafanaAdmin@Secure123"
    
    persistence:
      enabled: true
      existingClaim: grafana-data
      storageClassName: gp2
      size: 10Gi
      accessModes:
        - ReadWriteOnce
    
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 2000m
        memory: 2Gi
    
    service:
      type: ClusterIP
      port: 80
      targetPort: 3000
    
    # Auto-provision datasources
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: InfluxDB
            type: influxdb
            access: proxy
            url: http://influxdb-influxdb2.monitoring.svc.cluster.local:8086
            jsonData:
              version: Flux
              organization: enterprise-observability
              defaultBucket: metrics
              tlsSkipVerify: true
            secureJsonData:
              token: "enterprise-platform-influxdb-token-2024-super-secret"
            editable: false
            isDefault: true
          
          - name: Prometheus
            type: prometheus
            access: proxy
            url: http://otel-collector.monitoring.svc.cluster.local:9090
            isDefault: false
            editable: false
    
    # Auto-provision dashboards
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: 'enterprise'
            orgId: 1
            folder: 'Enterprise Observability'
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/enterprise
    
    dashboardsConfigMaps:
      enterprise: "grafana-dashboards"
    
    env:
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_ROOT_URL: "http://grafana.monitoring.svc.cluster.local"
      GF_INSTALL_PLUGINS: "grafana-clock-panel,grafana-piechart-panel"
      GF_FEATURE_TOGGLES_ENABLE: "publicDashboards"
    
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        nginx.ingress.kubernetes.io/rewrite-target: /
      hosts:
        - grafana.local
      path: /grafana
      pathType: Prefix
    
    livenessProbe:
      httpGet:
        path: /api/health
        port: 3000
      initialDelaySeconds: 60
      periodSeconds: 10
    
    readinessProbe:
      httpGet:
        path: /api/health
        port: 3000
      initialDelaySeconds: 30
      periodSeconds: 5
