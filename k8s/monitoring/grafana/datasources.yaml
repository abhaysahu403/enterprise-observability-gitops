apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: InfluxDB
        type: influxdb
        access: proxy
        url: http://influxdb.monitoring.svc.cluster.local:8086
        jsonData:
          version: Flux
          organization: enterprise-observability
          defaultBucket: metrics
          tlsSkipVerify: true
        secureJsonData:
          token: "enterprise-platform-influxdb-token-2024-super-secret"
        editable: false
        isDefault: true
      
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://otel-collector.monitoring.svc.cluster.local:9090
        isDefault: false
        editable: false
