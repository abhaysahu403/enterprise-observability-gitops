apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # Namespace
  - namespace.yaml
  
  # Helm Repositories (must be in flux-system namespace)
  - influxdb/helmrepository.yaml
  - grafana/helmrepository.yaml
  
  # InfluxDB (in monitoring namespace)
  - influxdb/pvc.yaml
  - influxdb/helmrelease.yaml
  
  # Grafana (in monitoring namespace)
  - grafana/pvc.yaml
  - grafana/datasources.yaml
  - grafana/helmrelease.yaml
  
  # OpenTelemetry Collector (in monitoring namespace)
  - otel-collector/configmap.yaml
  - otel-collector/deployment.yaml
  
  # Dashboards (in monitoring namespace)
  - dashboards/configmap.yaml
