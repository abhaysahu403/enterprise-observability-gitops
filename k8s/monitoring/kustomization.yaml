apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
resources:
  # Namespace
  - namespace.yaml
  
  # InfluxDB
  - influxdb/helmrepository.yaml
  - influxdb/pvc.yaml
  - influxdb/helmrelease.yaml
  
  # Grafana
  - grafana/helmrepository.yaml
  - grafana/pvc.yaml
  - grafana/datasources.yaml
  - grafana/helmrelease.yaml
  
  # OpenTelemetry Collector
  - otel-collector/configmap.yaml
  - otel-collector/deployment.yaml
  
  # Dashboards
  - dashboards/configmap.yaml
