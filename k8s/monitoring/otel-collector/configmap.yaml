apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: monitoring
data:
  config.yaml: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
    
    receivers:
      # OTLP receiver for traces, metrics, logs from applications
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
            cors:
              allowed_origins:
                - "*"
      
      # Prometheus scraper for Spring Boot Actuator metrics
      # Using static targets instead of Kubernetes SD for reliable scraping
      prometheus:
        config:
          scrape_configs:
            - job_name: 'gateway'
              scrape_interval: 30s
              metrics_path: '/actuator/prometheus'
              static_configs:
                - targets: ['gateway-service.enterprise-observability.svc.cluster.local:8080']
                  labels:
                    service_name: 'gateway'
                    app: 'gateway'
                    tier: 'api-gateway'
            
            - job_name: 'authentication-service'
              scrape_interval: 30s
              metrics_path: '/actuator/prometheus'
              static_configs:
                - targets: ['authentication-service.enterprise-observability.svc.cluster.local:8081']
                  labels:
                    service_name: 'authentication-service'
                    app: 'authentication-service'
            
            - job_name: 'employee-service'
              scrape_interval: 30s
              metrics_path: '/actuator/prometheus'
              static_configs:
                - targets: ['employee-service.enterprise-observability.svc.cluster.local:8082']
                  labels:
                    service_name: 'employee-service'
                    app: 'employee-service'
            
            - job_name: 'leave-service'
              scrape_interval: 30s
              metrics_path: '/actuator/prometheus'
              static_configs:
                - targets: ['leave-service.enterprise-observability.svc.cluster.local:8083']
                  labels:
                    service_name: 'leave-service'
                    app: 'leave-service'
            
            - job_name: 'payroll-service'
              scrape_interval: 30s
              metrics_path: '/actuator/prometheus'
              static_configs:
                - targets: ['payroll-service.enterprise-observability.svc.cluster.local:8084']
                  labels:
                    service_name: 'payroll-service'
                    app: 'payroll-service'
            
            - job_name: 'asset-service'
              scrape_interval: 30s
              metrics_path: '/actuator/prometheus'
              static_configs:
                - targets: ['asset-service.enterprise-observability.svc.cluster.local:8085']
                  labels:
                    service_name: 'asset-service'
                    app: 'asset-service'
            
            - job_name: 'helpdesk-service'
              scrape_interval: 30s
              metrics_path: '/actuator/prometheus'
              static_configs:
                - targets: ['helpdesk-service.enterprise-observability.svc.cluster.local:8086']
                  labels:
                    service_name: 'helpdesk-service'
                    app: 'helpdesk-service'
            
            - job_name: 'notification-service'
              scrape_interval: 30s
              metrics_path: '/actuator/prometheus'
              static_configs:
                - targets: ['notification-service.enterprise-observability.svc.cluster.local:8087']
                  labels:
                    service_name: 'notification-service'
                    app: 'notification-service'
    
    processors:
      # Batch processor for performance
      batch:
        timeout: 10s
        send_batch_size: 1024
        send_batch_max_size: 2048
      
      # Memory limiter to prevent OOM
      memory_limiter:
        check_interval: 1s
        limit_mib: 512
        spike_limit_mib: 128
      
      # Add resource attributes
      resource:
        attributes:
          - key: deployment.environment
            value: "production"
            action: upsert
          - key: cluster.name
            value: "enterprise-eks-cluster"
            action: upsert
          - key: platform
            value: "kubernetes"
            action: upsert
      
      # Add span attributes
      attributes:
        actions:
          - key: http.method
            action: upsert
            from_attribute: http.method
          - key: http.status_code
            action: upsert
            from_attribute: http.status_code
          - key: http.url
            action: upsert
            from_attribute: http.url
    
    exporters:
      # ===== SINGLE EXPORT TO INFLUXDB =====
      # Note: Dynatrace OneAgent already collects telemetry separately
      # No need to export from OTel Collector to Dynatrace
      
      # Export to InfluxDB for Grafana visualization
      influxdb:
        endpoint: http://influxdb-influxdb2.monitoring.svc.cluster.local:8086
        org: enterprise-observability
        bucket: metrics
        token: "enterprise-platform-influxdb-token-2024-super-secret"
        timeout: 10s
        metrics_schema: "telegraf-prometheus-v1"
      
      # Prometheus exporter for Grafana to scrape
      prometheus:
        endpoint: "0.0.0.0:9090"
        namespace: enterprise
        const_labels:
          cluster: enterprise-eks-cluster
          environment: production
        resource_to_telemetry_conversion:
          enabled: true
      
      # Logging exporter for debugging
      logging:
        loglevel: info
        sampling_initial: 5
        sampling_thereafter: 200
    
    service:
      extensions: [health_check]
      
      pipelines:
        # ===== TRACES PIPELINE - InfluxDB only =====
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch, resource, attributes]
          exporters: [influxdb, logging]
        
        # ===== METRICS PIPELINE - InfluxDB + Prometheus =====
        metrics:
          receivers: [otlp, prometheus]
          processors: [memory_limiter, batch, resource]
          exporters: [influxdb, prometheus]
        
        # ===== LOGS PIPELINE - InfluxDB only =====
        logs:
          receivers: [otlp]
          processors: [memory_limiter, batch, resource]
          exporters: [influxdb, logging]
      
      # Telemetry configuration
      telemetry:
        logs:
          level: info
        metrics:
          level: detailed
          address: 0.0.0.0:8888
