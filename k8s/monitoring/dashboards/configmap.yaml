apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  jvm-metrics.json: |
    {
      "title": "Enterprise Platform - JVM Metrics",
      "tags": ["jvm", "spring-boot"],
      "timezone": "browser",
      "panels": [
        {
          "id": 1,
          "title": "JVM Heap Memory Usage (MB)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [
            {
              "datasource": "InfluxDB",
              "query": "from(bucket: \"metrics\") |> range(start: -1h) |> filter(fn: (r) => r._measurement == \"jvm_memory_used_bytes\" and r.area == \"heap\") |> map(fn: (r) => ({r with _value: r._value / 1048576}))"
            }
          ]
        },
        {
          "id": 2,
          "title": "Garbage Collection Time (ms)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [
            {
              "datasource": "InfluxDB",
              "query": "from(bucket: \"metrics\") |> range(start: -1h) |> filter(fn: (r) => r._measurement == \"jvm_gc_pause_seconds_sum\") |> map(fn: (r) => ({r with _value: r._value * 1000}))"
            }
          ]
        }
      ],
      "refresh": "30s",
      "time": {"from": "now-1h", "to": "now"}
    }
  
  gateway-metrics.json: |
    {
      "title": "Enterprise Platform - API Gateway",
      "tags": ["gateway", "api"],
      "timezone": "browser",
      "panels": [
        {
          "id": 1,
          "title": "Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [
            {
              "datasource": "InfluxDB",
              "query": "from(bucket: \"metrics\") |> range(start: -1h) |> filter(fn: (r) => r._measurement == \"http_server_requests_seconds_count\" and r.service_name == \"gateway\")"
            }
          ]
        },
        {
          "id": 2,
          "title": "Response Time P95 (ms)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [
            {
              "datasource": "InfluxDB",
              "query": "from(bucket: \"metrics\") |> range(start: -1h) |> filter(fn: (r) => r._measurement == \"http_server_requests_seconds\" and r.service_name == \"gateway\" and r.quantile == \"0.95\")"
            }
          ]
        }
      ],
      "refresh": "10s",
      "time": {"from": "now-1h", "to": "now"}
    }
  
  kubernetes-cluster.json: |
    {
      "title": "Enterprise Platform - Kubernetes Cluster",
      "tags": ["kubernetes", "cluster"],
      "timezone": "browser",
      "panels": [
        {
          "id": 1,
          "title": "Pod Count by Namespace",
          "type": "stat",
          "gridPos": {"h": 6, "w": 8, "x": 0, "y": 0},
          "targets": [
            {
              "datasource": "Prometheus",
              "expr": "count(kube_pod_info{namespace=\"enterprise-observability\"}) by (namespace)"
            }
          ]
        },
        {
          "id": 2,
          "title": "CPU Usage by Pod",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 6},
          "targets": [
            {
              "datasource": "Prometheus",
              "expr": "rate(container_cpu_usage_seconds_total{namespace=\"enterprise-observability\"}[5m])"
            }
          ]
        }
      ],
      "refresh": "30s",
      "time": {"from": "now-1h", "to": "now"}
    }
  
  employee-service.json: |
    {
      "title": "Enterprise Platform - Employee Service",
      "tags": ["employee", "microservice"],
      "timezone": "browser",
      "panels": [
        {
          "id": 1,
          "title": "Request Count",
          "type": "stat",
          "gridPos": {"h": 6, "w": 6, "x": 0, "y": 0},
          "targets": [
            {
              "datasource": "InfluxDB",
              "query": "from(bucket: \"metrics\") |> range(start: -1h) |> filter(fn: (r) => r._measurement == \"http_server_requests_seconds_count\" and r.service_name == \"employee-service\") |> sum()"
            }
          ]
        },
        {
          "id": 2,
          "title": "Error Rate",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 6, "y": 0},
          "targets": [
            {
              "datasource": "InfluxDB",
              "query": "from(bucket: \"metrics\") |> range(start: -1h) |> filter(fn: (r) => r._measurement == \"http_server_requests_seconds_count\" and r.service_name == \"employee-service\" and r.status >= \"400\")"
            }
          ]
        }
      ],
      "refresh": "30s",
      "time": {"from": "now-1h", "to": "now"}
    }
  
  postgresql-metrics.json: |
    {
      "title": "Enterprise Platform - PostgreSQL",
      "tags": ["postgresql", "database"],
      "timezone": "browser",
      "panels": [
        {
          "id": 1,
          "title": "Active Connections",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [
            {
              "datasource": "InfluxDB",
              "query": "from(bucket: \"metrics\") |> range(start: -1h) |> filter(fn: (r) => r._measurement == \"hikaricp_connections_active\")"
            }
          ]
        },
        {
          "id": 2,
          "title": "Connection Pool Size",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [
            {
              "datasource": "InfluxDB",
              "query": "from(bucket: \"metrics\") |> range(start: -1h) |> filter(fn: (r) => r._measurement == \"hikaricp_connections\")"
            }
          ]
        }
      ],
      "refresh": "30s",
      "time": {"from": "now-1h", "to": "now"}
    }
