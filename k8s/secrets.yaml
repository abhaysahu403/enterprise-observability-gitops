  DB_USER: "enterprise"
  DB_PASSWORD: "enterprise_pass"
  POSTGRES_USER: "enterprise"
  POSTGRES_PASSWORD: "enterprise_pass"
  
  # JWT Secret (base64 encoded, matches docker-compose)
  JWT_SECRET: "ZW50ZXJwcmlzZS1vYnNlcnZhYmlsaXR5LWRlbW8tc3VwZXItc2VjcmV0LWtleS1jaGFuZ2UtbWU="
  
  # Dynatrace Configuration (placeholders - replace with actual values when available)
  DYNATRACE_API_TOKEN: "placeholder-token-replace-when-dynatrace-configured"
  DYNATRACE_TENANT_URL: "https://placeholder.live.dynatrace.com"