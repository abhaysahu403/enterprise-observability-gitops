---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: enterprise-observability
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
      annotations:
        dynatrace.com/instrument: "true"
    spec:
      containers:
        - name: frontend
          image: 039612843833.dkr.ecr.us-east-1.amazonaws.com/enterprise-observability/frontend:v1.0.3
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: VITE_API_BASE_URL
              value: "/api"
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5