---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: leave-service
  namespace: enterprise-observability
  labels:
    app: leave-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: leave-service
  template:
    metadata:
      labels:
        app: leave-service
      annotations:
        dynatrace.com/instrument: "true"
        prometheus.io/scrape: "true"
        prometheus.io/port: "8083"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: leave-service
          image: 039612843833.dkr.ecr.us-east-1.amazonaws.com/enterprise-observability/leave-service:v1.0.0
          ports:
            - containerPort: 8083
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: enterprise-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: enterprise-config
                  key: DB_PORT
            - name: DB_NAME
              value: "leave_db"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: enterprise-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: enterprise-secrets
                  key: DB_PASSWORD
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: enterprise-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: enterprise-config
                  key: REDIS_PORT
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: enterprise-secrets
                  key: JWT_SECRET
            - name: DYNATRACE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: enterprise-secrets
                  key: DYNATRACE_API_TOKEN
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            initialDelaySeconds: 150
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8083
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3